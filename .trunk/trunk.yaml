version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.2
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - checkov
    - trufflehog
    - yamllint
    - trivy
  enabled:
    - prettier@3.6.2
    - actionlint@1.7.7
    - markdownlint@0.45.0
    - git-diff-check
    - gitleaks@8.28.0
runtimes:
  enabled:
    - python@3.10.8
    - go@1.21.0
    - node@22.16.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
